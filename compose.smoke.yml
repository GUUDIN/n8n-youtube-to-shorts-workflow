version: '3.8'

# ========================================================================
# SMOKE TEST DOCKER COMPOSE CONFIGURATION
# ========================================================================
# Minimal setup to boot n8n + Postgres for smoke testing the 
# video-to-shorts workflow as-is. No optional services included.
#
# Usage:
#   docker compose -f compose.smoke.yml up -d
#   docker compose -f compose.smoke.yml down -v  # cleanup
# ========================================================================

services:
  # ----------------------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------------------
  # Persistent storage for n8n workflow definitions, credentials, 
  # and execution history.
  # ----------------------------------------------------------------------
  db:
    image: postgres:16
    container_name: n8n-smoke-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n
    volumes:
      # Persist database data across container restarts
      - ./.vol/db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U n8n -d n8n']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - n8n-smoke

  # ----------------------------------------------------------------------
  # n8n Workflow Automation
  # ----------------------------------------------------------------------
  # Main n8n instance with web UI on port 5678.
  # Connects to PostgreSQL for persistent storage.
  # ----------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-smoke-app
    restart: unless-stopped
    ports:
      # Web UI and API access
      - "5678:5678"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Core n8n configuration
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      
      # Security: Required for encrypting credentials in the database
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      
      # PostgreSQL connection
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: ${DB_POSTGRESDB:-n8n}
      DB_POSTGRESDB_USER: ${DB_POSTGRESDB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${DB_POSTGRESDB_PASSWORD:-n8n}
      DB_POSTGRESDB_HOST: ${DB_POSTGRESDB_HOST:-db}
      DB_POSTGRESDB_PORT: ${DB_POSTGRESDB_PORT:-5432}
      
      # Store binary data (videos, images) on filesystem to avoid
      # bloating the database during smoke tests
      N8N_DEFAULT_BINARY_DATA_MODE: ${N8N_DEFAULT_BINARY_DATA_MODE:-filesystem}
      
      # Allow execution of workflows from the CLI/API
      EXECUTIONS_MODE: regular
    volumes:
      # Persist n8n data: workflows, credentials, binary files
      - ./.vol/n8n:/home/node/.n8n
      
      # Mount workflows directory for easy CLI import
      # (read-only to prevent accidental modification)
      - ./workflows:/workflows:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:5678/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - n8n-smoke

# ========================================================================
# NETWORKS
# ========================================================================
networks:
  n8n-smoke:
    name: n8n-smoke-network
    driver: bridge
